<body>

<p>YouTube Subscribe Button

</p>

<button onclick="
  subscribe();


  " class="js-subscribe-button">Subscribe</button>




<p>Rock Paper Scissors

<p>Amazon Shipping Calculator

</p>
<p>Orders under $40 = +$10 shipping.

</p>
<p>Orders over $40 = FREE shipping.

</p>

<input type="text" placeholder="Cost of order" class="js-cost-input" onkeydown="handleCostKeydown(event);" 
>

<button onclick="calculateTotal();">Calculate </button>

<p class="js-total-cost"></p>




<script>

function subscribe(){

    const buttonElement=document.querySelector('.js-subscribe-button') ;


  if(buttonElement.innerText==='Subscribe')
  {

  buttonElement.innerText='Subscribed';

  }
  else {buttonElement.innerText='Subscribe';
  }


}


function handleCostKeydown(event){
onkeydown=event.key;
if(event.key==='Enter'){
  calculateTotal();
}

}


function calculateTotal(){

   const inputElemet= document.querySelector('.js-cost-input');

  let cost=Number(inputElemet.value);
  if(cost<40){
    cost+=10;
  }

  document.querySelector('.js-total-cost').innerHTML=`$${cost}`;

}









</script>



</body>
