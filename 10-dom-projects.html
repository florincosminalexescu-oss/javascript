<!DOCTYPE html>

<html>


<head>   
  <title>DOM exercises</title>


  <style>

    body{
      font-family: Arial;
      


    }

    .js-subscribe-button{
      border:none;
      color: white;
      background-color: black;
      padding:10px 15px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      margin-bottom: 20px;


    }

   .is-subscribed{

    background-color: rgb(240, 240, 240);
    color:black;

   }

   .cost-input{

    font-size: 15px;
    padding: 10px ;


   }

   .calculator-button{
    background-color: green;
    color: white;
    border: none;
    font-size: 15px;
    padding: 11px 15px;
    cursor: pointer;
   }


  </style>

</head>


<body>

<p>YouTube Subscribe Button

</p>

<button onclick="
  subscribe();


  " class="js-subscribe-button">Subscribe</button>




<p>Rock Paper Scissors

</p>

<a href="09-rock-paper-scissors.html">Click here
  
</a>


<p>Amazon Shipping Calculator

</p>
<p>Orders under $40 = +$10 shipping.

</p>
<p>Orders over $40 = FREE shipping.

</p>

<input type="text" placeholder="Cost of order" class="js-cost-input cost-input" onkeydown="handleCostKeydown(event);" 
>

<button onclick="calculateTotal();" class="calculator-button">Calculate </button>

<p class="js-total-cost"></p>




<script>

function subscribe(){

    const buttonElement=document.querySelector('.js-subscribe-button') ;


  if(buttonElement.innerText==='Subscribe')
  {

  buttonElement.innerText='Subscribed';
  buttonElement.classList.add('is-subscribed');

  }
  else {buttonElement.innerText='Subscribe';
  buttonElement.classList.remove('is-subscribed');
  }


}


function handleCostKeydown(event){
onkeydown=event.key;
if(event.key==='Enter'){
  calculateTotal();
}

}


function calculateTotal(){

   const inputElemet= document.querySelector('.js-cost-input');

  let cost=Number(inputElemet.value);
  if(cost<40){
    cost+=10;
  }

  document.querySelector('.js-total-cost').innerHTML=`$${cost}`;

}









</script>



</body>





</html>
